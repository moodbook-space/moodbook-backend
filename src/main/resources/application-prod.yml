spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    generate-ddl: true
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  sql:
    init:
      mode: never

  elasticsearch:
    uris: ${ELASTICSEARCH_URI}

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}

    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 6000

management:
  endpoints:
    web:
      exposure:
        include: "*"
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: true

cloud:
  aws:
    s3:
      bucketName: ${AWS_S3_BUCKET_NAME}
    stack:
      auto: false
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

aladin:
  api:
    key: ${ALADIN_API_KEY}
    base-url: ${ALADIN_BASE_URL}

jwt:
  secretKey: ${JWT_SECRET}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 6048020000

openai:
  api-key: ${OPENAI_API_KEY}
  url: ${OPENAI_URL}
  model: ${OPENAI_MODEL}

logging:
  pattern:
    console: ${LOG_CONSOLE_PATTERN}