spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    generate-ddl: true
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  sql:
    init:
      mode: never

  elasticsearch:
    uris: ${ELASTICSEARCH_URI}
    host: ${ELASTICSEARCH_URI}

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}

    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 6000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - ${GOOGLE_SCOPE}
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: ${KAKAO_CLIENT_NAME}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

moodbook:
  url:
    frontend: ${MOODBOOK_FRONTEND_URL}
    backend: ${MOODBOOK_BACKEND_URL}

management:
  endpoints:
    web:
      exposure:
        include: "*"
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: true

cloud:
  aws:
    s3:
      bucketName: ${AWS_S3_BUCKET_NAME}
    stack:
      auto: false
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

aladin:
  api:
    key: ${ALADIN_API_KEY}
    base-url: ${ALADIN_BASE_URL}

jwt:
  secretKey: ${JWT_SECRET}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 6048020000

openai:
  api-key: ${OPENAI_API_KEY}
  url: ${OPENAI_URL}
  model: ${OPENAI_MODEL}

logging:
  pattern:
    console: ${LOG_CONSOLE_PATTERN}