<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 페이지</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f8f8f8;
    }

    .sidebar {
      position: fixed;
      width: 180px;
      height: 100vh;
      background: linear-gradient(to bottom, #2c3e50, #34495e);
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar img {
      width: 100px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .main {
      margin-left: 200px;
      padding: 30px;
      position: relative;
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .main-header h1 {
      font-size: 28px;
      font-weight: bold;
    }

    .main-header img {
      width: 100px;
      border-radius: 5px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .grid button {
      width: 150px;
      height: 80px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      background-color: #ddd;
      cursor: pointer;
    }

    .onion {
      position: absolute;
      display: flex;
      align-items: center;
      z-index: 9999;
      transition: transform 0.2s linear;
    }



    .onion img {
      width: 80px;
    }

    .speech {
      background-color: white;
      border: 3px solid black;
      padding: 10px;
      border-radius: 10px;
      margin-left: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <img src="/images/logo.png" alt="로고" onclick="alert('이동 주소는 아직 미정입니다.')">
  </div>

  <div class="main">
    <div class="main-header">
      <h1>관리자 페이지</h1>
      <img src="/images/gendo.png" alt="관리자">
    </div>

    <div class="grid">
      <button onclick="location.href='/admin/book'">책 추가/제거</button>
      <button onclick="location.href='/admin/member'">유저 관리</button>
      <button onclick="location.href='/admin/chat'">채팅방 관리</button>
      <button>리뷰 태그 추출</button>
      <button>추천 리스트 관리</button>
    </div>


  </div>
  <div class="onion" id="onion">
    <img src="/images/onion.png" alt="양파">
    <div class="speech">오늘의 제적 : 김영민</div>
  </div>
</body>
</html>
<script>
  const onion = document.getElementById('onion');

  let posX = 100;
  let posY = 100;
  let velX = 2.5;
  let velY = 2.0;

  // 마우스 위치
  let mouseX = null;
  let mouseY = null;

  // 사운드 객체
  const bounceSound = new Audio('/sounds/bounce.mp3');

  function playBounceSound() {
    if (bounceSound.paused) {
      bounceSound.currentTime = 0;
      bounceSound.play();
    } else {
      // 이미 재생 중이면 클론 객체 생성해서 재생
      const clone = bounceSound.cloneNode();
      clone.play();
    }
  }

  // 마우스 추적
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    const onionWidth = onion.offsetWidth;
    const onionHeight = onion.offsetHeight;
    const maxX = window.innerWidth - onionWidth;
    const maxY = window.innerHeight - onionHeight;

    // 마우스 회피
    if (mouseX !== null && mouseY !== null) {
      const centerX = posX + onionWidth / 2;
      const centerY = posY + onionHeight / 2;
      const dx = mouseX - centerX;
      const dy = mouseY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 150) {
        const angle = Math.atan2(dy, dx);
        velX -= Math.cos(angle) * 0.5;
        velY -= Math.sin(angle) * 0.5;
      }
    }

    posX += velX;
    posY += velY;

    // 충돌 감지 로직
    if (posX <= 0 || posX >= maxX) {
      if (!hitX) {
        velX *= -1;
        playBounceSound();
        hitX = true;
      }
    } else {
      hitX = false;
    }

    if (posY <= 0 || posY >= maxY) {
      if (!hitY) {
        velY *= -1;
        playBounceSound();
        hitY = true;
      }
    } else {
      hitY = false;
    }

    // 속도 제한
    velX = Math.max(Math.min(velX, 4), -4);
    velY = Math.max(Math.min(velY, 4), -4);

    // 회전
    const angleDeg = Math.atan2(velY, velX) * 180 / Math.PI;
    onion.style.transform = `rotate(${angleDeg}deg)`;

    onion.style.left = `${posX}px`;
    onion.style.top = `${posY}px`;

    requestAnimationFrame(animate);
  }

  onion.style.position = 'absolute';
  onion.style.left = `${posX}px`;
  onion.style.top = `${posY}px`;
  onion.style.transition = 'transform 0.2s linear';

  animate();
</script>
