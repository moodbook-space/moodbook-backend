<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>관리자 페이지</title>
  <style>
    body {
      font-family: "Pretendard", sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 130px;
      height: 100vh;
      background: linear-gradient(to bottom, #2c3e50, #4c5c70);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar img {
      width: 80px;
      margin-bottom: 10px;
    }

    .container {
      margin-left: 130px;
      padding: 40px;
      position: relative;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .admin-img {
      position: absolute;
      top: 40px;
      right: 50px;
      width: 120px;
      border-radius: 8px;
    }

    .button {
      width: 180px;
      height: 80px;
      background-color: #dddddd;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      margin: 20px;
      text-decoration: none;
      color: #000;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 200px);
      grid-gap: 30px;
      margin-bottom: 40px;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 50px;
    }

    .footer img {
      height: 60px;
    }

    .speech-bubble {
      background-color: black;
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <img src="/images/logo.png" alt="로고">
</div>

<div class="container">
  <img class="admin-img" src="/images/gendo.png" alt="관리자 이미지">

  <div class="title">관리자 페이지</div>

  <div class="button-grid">
    <a class="button" th:href="@{/admin/books}">책 추가/제거</a>
    <a class="button" th:href="@{/admin/users}">유저 관리</a>
    <a class="button" th:href="@{/admin/chat}">채팅방 관리</a>
    <a class="button" th:href="@{/admin/reviews}">리뷰 태그 추출</a>
    <a class="button" th:href="@{/admin/recommend}">추천 리스트 관리</a>
  </div>

  <div class="footer">
    <img src="/images/onion.png" alt="캐릭터">
    <div class="speech-bubble">오늘의 제작 : 김영민</div>
  </div>
</div>

</body>
</html>
