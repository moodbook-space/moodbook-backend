<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>책 조회 / 제거</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }
    .sidebar {
      position: fixed;
      width: 180px;
      height: 100vh;
      background: linear-gradient(to bottom, #2c3e50, #34495e);
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar img {
      width: 100px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .sidebar button {
      width: 100%;
      padding: 10px;
      background-color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    .main {
      margin-left: 200px;
      padding: 30px;
      display: flex;
      justify-content: space-between;
    }
    .left-section {
      flex: 3;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 28px;
      font-weight: bold;
    }
    .header img {
      height: 80px;
    }
    .search-section {
      display: flex;
      margin: 20px 0;
    }
    .search-section input[type="text"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px 0 0 5px;
    }
    .search-section button {
      padding: 8px 12px;
      border: 1px solid #ccc;
      background-color: #eee;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
    }
    .table-container {
      max-height: 400px;
      overflow-y: auto;
      background-color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #f0f0f0;
      font-weight: bold;
    }
    .delete-btn {
      font-size: 20px;
      color: red;
      cursor: pointer;
    }
    .right-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-book-box {
      width: 120px;
      height: 300px;
      background-color: #e0e0e0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="sidebar">
  <img src="/admin/images/logo.png" alt="로고" onclick="onLogoClick()">
  <button onclick="location.href='/admin'">관리자페이지</button>
</div>

<div class="main">
  <div class="left-section">
    <div class="header">
      <h1>책 조회 / 제거</h1>
      <img src="/admin/images/gendo.png" alt="관리자 이미지">
    </div>

    <div class="search-section">
      <input type="text" id="search-input" placeholder="책 제목 또는 저자 검색" onkeydown="if(event.key === 'Enter') searchBooks()">
      <button onclick="searchBooks()">검색</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
        <tr>
          <th>커버</th>
          <th>제목</th>
          <th>저자</th>
          <th>삭제</th>
        </tr>
        </thead>
        <tbody id="book-tbody">
        </tbody>
      </table>
    </div>
  </div>

  <div class="right-section">
    <div class="add-book-box" onclick="location.href='/admin/book_add'">
      책 추가
    </div>
  </div>
</div>

<script>
  let currentPage = 0;
  const pageSize = 10;
  let currentQuery = "";

  function fetchBooks(page, query = "") {
    fetch(`/api/admin/book?page=${page}&size=${pageSize}&query=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => {
      renderBooks(data.content);
    });
  }

  function renderBooks(books) {
    const tbody = document.getElementById("book-tbody");
    tbody.innerHTML = "";
    books.forEach(book => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><img src="${book.coverImage || 'images/book.png'}" alt="cover" width="50"></td>
        <td>${book.title}</td>
        <td>${book.author}</td>
        <td><span class="delete-btn" onclick="deleteBook(${book.id})">&#10060;</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function searchBooks() {
    const keyword = document.getElementById("search-input").value;
    currentPage = 0;
    currentQuery = keyword;
    fetchBooks(currentPage, currentQuery);
  }

  function deleteBook(id) {
    if (confirm("정말 삭제하시겠습니까?")) {
      fetch(`/api/admin/book/${id}`, { method: 'DELETE' })
      .then(res => {
        if (res.ok) fetchBooks(currentPage, currentQuery);
      });
    }
  }

  function onLogoClick() {
    alert("아직 이동 경로가 지정되지 않았습니다.");
  }

  function onAddBook() {
    alert("책 추가 화면으로 이동 예정");
  }

  fetchBooks(currentPage);
</script>
</body>
</html>
