<!-- templates/chat-room-chat.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <title>채팅</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <meta charset="UTF-8">
</head>
<body>
<h1 th:text="${room.title}">채팅방</h1>
<div id="chat-messages"></div>
<input type="text" id="messageInput"/>
<button onclick="sendMessage()">보내기</button>
<script th:inline="javascript">
  // 웹소켓 연결 설정
  const roomId = '[[${room.chatRoomId}]]';
  const memberName = '[[${myMemberName}]]';

  const socket = new SockJS('/ws-chat?nickname=' + memberName);
  const stompClient = Stomp.over(socket);

  stompClient.connect({}, function(frame) {
    stompClient.subscribe('/topic/room.' + roomId, function(msg) {
      const chatMessage = JSON.parse(msg.body);
      const msgDiv = document.createElement('div');
      msgDiv.textContent = chatMessage.sender + ": " + chatMessage.message;
      document.getElementById('chat-messages').appendChild(msgDiv);
    });
  });

  function sendMessage() {
    const message = document.getElementById('messageInput').value;
    const chatMessage = {
      roomId: roomId,
      sender: memberName,
      message: message,
      time: new Date().toISOString()
    };
    stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
    document.getElementById('messageInput').value = '';
  }
</script>
</body>
</html>
