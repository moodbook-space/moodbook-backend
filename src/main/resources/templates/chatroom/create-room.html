<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <title>채팅방 생성</title>
  <meta charset="UTF-8">
</head>

<body>
<h1>채팅방 만들기</h1>
<form action="#" th:action="@{/chat-rooms/create}" method="post" id="createRoomForm">
  <label>방 제목: <input type="text" name="title"/></label><br/>
  <label>최대 인원: <input type="number" name="limitMembers" min="2" value="10"/></label><br/>
  <button type="submit">생성</button>
</form>
<script>
  document.getElementById('createRoomForm').onsubmit = function(e){
    e.preventDefault();
    fetch('/api/chat-rooms', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        title: this.title.value,
        limitMembers: this.limitMembers.value
      })
    })
    .then(res => res.json())
    .then(data => { alert('채팅방 생성 완료!'); window.location.href = '/chat-rooms'; });
  }
</script>
</body>
</html>
